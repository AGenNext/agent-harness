version: '3.8'

services:
  # =============================================
  # Production Configuration
  # =============================================
  
  harness:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Only localhost, access via nginx
      - "127.0.0.1:3022:3022"
    volumes:
      - agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HARNESS_SECRET=${HARNESS_SECRET:?required}
      - HARNESS_DATABASE__URL=${DATABASE_URL}
      - HARNESS_DOCKER=true
      - HARNESS_DEBUG=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agent-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl:/etc/ssl:ro
    depends_on:
      - harness
    networks:
      - agent-network

  # Redis for sessions/cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - agent-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Agent services (as above, production settings)
  code-assist:
    image: openautonomyx/code-assist:latest
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODE_ASSIST_HOOK=${MATTERMOST_HOOK}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    networks:
      - agent-network

  code-review:
    image: openautonomyx/code-review:latest
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODE_REVIEW_HOOK=${MATTERMOST_HOOK}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    networks:
      - agent-network

  code-tester:
    image: openautonomyx/code-tester:latest
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODE_TESTER_HOOK=${MATTERMOST_HOOK}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    networks:
      - agent-network

  code-deploy:
    image: openautonomyx/code-deploy:latest
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODE_DEPLOY_HOOK=${MATTERMOST_HOOK}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agent-network

volumes:
  agent-data:
  redis-data:

networks:
  agent-network:
    driver: bridge